      const pBlocks = byTag[pt];
      if (!pBlocks || !pBlocks.length) {
        warns.push({
          kind: 'prereq', severity: 'missing',
          msg: `"${b.ttl}" needs prereq [${pt}] but no matching block exists.`,
          block_ids: [b.id],
        });
        continue;
      }
      // Find earliest prereq placement
      const earliestPrereq = pBlocks.reduce((m, x) => absMin(x) < absMin(m) ? x : m, pBlocks[0]);
      if (absMin(earliestPrereq) >= absMin(b)) {
        warns.push({
          kind: 'prereq',
          msg: `"${b.ttl}" is before its prereq "${earliestPrereq.ttl}" — ${describeWhen(b)} comes before ${describeWhen(earliestPrereq)}.`,
          block_ids: [b.id, earliestPrereq.id],
        });
      }
    }
  }

  // 2. Pin proximity
  for (const b of state.blocks) {
    if (!b.tag || !PIN_SERVICE[b.tag]) continue;
    const pinTag = PIN_SERVICE[b.tag];
    const pinBlocks = byTag[pinTag];
    if (!pinBlocks || !pinBlocks.length) continue;
    const earliestPin = pinBlocks.reduce((m, x) => absMin(x) < absMin(m) ? x : m, pinBlocks[0]);
    const dayDelta = ((earliestPin.w - b.w) * 7 + (earliestPin.d - b.d));
    if (dayDelta < 0) {
      // block is after its pin — that's also bad
      warns.push({
        kind: 'proximity',
        msg: `"${b.ttl}" is AFTER its pin "${earliestPin.ttl}" by ${-dayDelta} day(s). Students need it before authentic use.`,
        block_ids: [b.id, earliestPin.id],
      });
    } else if (dayDelta > PIN_PROXIMITY_DAYS) {
      warns.push({
        kind: 'proximity',
        msg: `"${b.ttl}" is ${dayDelta} days before its pin "${earliestPin.ttl}". Risk: felt need will fade before use.`,
        block_ids: [b.id, earliestPin.id],
      });
    }
  }

  // 3. Guide overbooking (same guide, overlapping time, same day across weeks)
  const byGuideDay = {};
  for (const b of state.blocks) {
    if (!b.guide) continue;
    const key = `${b.guide}|${b.w}|${b.d}`;
    (byGuideDay[key] = byGuideDay[key] || []).push(b);
  }
  for (const key of Object.keys(byGuideDay)) {
    const list = byGuideDay[key];
    for (let i = 0; i < list.length; i++) {
      for (let j = i+1; j < list.length; j++) {
        const a = list[i], c = list[j];
        const aEnd = a.s + a.dur;
        const cEnd = c.s + c.dur;
        if (a.s < cEnd && aEnd > c.s) {
          warns.push({
            kind: 'guide',
            msg: `Guide ${a.guide} is booked simultaneously: "${a.ttl}" and "${c.ttl}" on ${describeDay(a)}.`,
            block_ids: [a.id, c.id],
          });
        }
      }
    }
  }

  return warns;
}

function describeWhen(b) {
  return `Wk ${b.w} ${DAY_LABELS[b.d]} ${formatTime(b.s)}`;
}
function describeDay(b) {
  return `Wk ${b.w} ${DAY_LABELS[b.d]}`;
}

function computeWarningsByWeek() {
  const out = {};
  const warns = computeWarnings();
  for (const w of warns) {
    // Attribute each warning to the earliest-involved week
    let minW = 99;
    for (const id of w.block_ids) {
      const b = state.blocks.find(x => x.id === id);
      if (b && b.w < minW) minW = b.w;
    }
    if (minW < 99) out[minW] = (out[minW] || 0) + 1;
  }
  return out;
}

function renderWarnSummary() {
  const warns = computeWarnings();
  const wcEl = document.getElementById('warncount-trailing');
  if (wcEl) {
    wcEl.innerHTML = warns.length
      ? `<span class="wc-num">${warns.length}</span> warnings`
      : `<span style="opacity:0.5;">No warnings</span>`;
  }
  const summary = document.getElementById('warn-summary');
  const counts = { prereq: 0, proximity: 0, guide: 0 };
  for (const w of warns) counts[w.kind]++;
  summary.innerHTML = `
    <div class="row"><span>Prerequisite violations</span><span class="n">${counts.prereq}</span></div>
    <div class="row"><span>Pin-proximity flags</span><span class="n">${counts.proximity}</span></div>
    <div class="row"><span>Guide overbookings</span><span class="n">${counts.guide}</span></div>
  `;
}

function renderWarningsList() {
  const warns = computeWarnings();
  const list = document.getElementById('warn-list');
  list.innerHTML = '';
  if (!warns.length) {
    list.innerHTML = '<div class="warn-item"><div class="title">No warnings.</div><div class="detail">Either everything checks out, or you haven\'t assigned guides yet (guide warnings only fire on assignments).</div></div>';
  }
  // Sort: prereq first, then proximity, then guide; then by earliest involved week
  warns.sort((a,b) => {
    const kindOrd = {prereq:0, proximity:1, guide:2};
    if (kindOrd[a.kind] !== kindOrd[b.kind]) return kindOrd[a.kind] - kindOrd[b.kind];
    const minW = w => Math.min(...w.block_ids.map(id => state.blocks.find(x=>x.id===id)?.w ?? 99));
    return minW(a) - minW(b);
  });
  for (const w of warns) {
    const div = document.createElement('div');
    div.className = 'warn-item';
    const tagText = { prereq: 'PREREQ', proximity: 'PROXIMITY', guide: 'GUIDE' }[w.kind];
    div.innerHTML = `
      <span class="tag ${w.kind}">${tagText}</span>
      <div class="title">${escapeHtml(w.msg)}</div>
    `;
    div.onclick = () => focusFirstBlock(w.block_ids[0]);
    list.appendChild(div);
  }
}

// Backward-compat wrapper so any other caller that expects renderWarnings still works.
function renderWarnings() {
  renderWarnSummary();
  renderWarningsList();
}

// ============================================================
// SELECTION / LINEAGE / PIN READINESS
// ============================================================
// Selection model: state.selectedBlockIds is an array (zero or more ids).
// The LAST entry is the "focal" block — it drives the lineage panel,
// the prereq/dependent rings, and the focusAndReroot target.
// All entries get the .ring-selected accent ring.
//
// state.selectedPinId is mutually exclusive with block selection.
// Selecting any block clears the pin; selecting a pin clears block ids.

function focalBlockId() {
  const arr = state.selectedBlockIds;
  return arr && arr.length ? arr[arr.length - 1] : null;
}

function selectBlock(id) {
  // Plain click — replace selection with [id].
  state.selectedBlockIds = [id];
  state.selectedPinId = null;
  saveState();
  render();
}

function toggleBlockInSelection(id) {
  // Cmd/Ctrl+click — toggle membership without replacing.
  state.selectedPinId = null;
  const arr = state.selectedBlockIds || [];
  const idx = arr.indexOf(id);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(id);
  state.selectedBlockIds = arr;
  saveState();
  render();
}

function selectPin(id) {
  state.selectedPinId = id;
  state.selectedBlockIds = [];
  saveState();
  render();
}
function clearSelection() {
  if ((!state.selectedBlockIds || !state.selectedBlockIds.length) && !state.selectedPinId) return;
  state.selectedBlockIds = [];
  state.selectedPinId = null;
  saveState();
  render();
}

// Absolute minute from Week 1 Mon 9:00 AM — used for chronology comparisons.
function absMinLin(b) {
  return ((b.w - 1) * 7 + b.d) * 24 * 60 + b.s;
}

function prereqStatusVs(prereqB, selB) {
  // prereqB should be BEFORE selB. Use end-of-prereq vs start-of-selected.
  const pEnd = absMinLin(prereqB) + prereqB.dur;
  const sStart = absMinLin(selB);
  if (pEnd <= sStart) return { glyph: '✓', tone: 'ok' };     // finishes before selected starts
  if (absMinLin(prereqB) < sStart) return { glyph: '⚠', tone: 'warn' }; // overlapping edge
  return { glyph: '✗', tone: 'bad' };                         // at/after selected start
}

function dependentStatusVs(depB, selB) {
  // depB should be AFTER selB. Use start-of-dep vs end-of-selected.
  const dStart = absMinLin(depB);
  const sEnd = absMinLin(selB) + selB.dur;
  if (dStart >= sEnd) return { glyph: '✓', tone: 'ok' };
  if (dStart > absMinLin(selB)) return { glyph: '⚠', tone: 'warn' };
  return { glyph: '✗', tone: 'bad' };
}

function gapString(earlier, later) {
  if (earlier.w === later.w && earlier.d === later.d) return 'same day';
  const dayDelta = ((later.w - earlier.w) * 7 + (later.d - earlier.d));
  const abs = Math.abs(dayDelta);
  const unit = abs === 1 ? 'day' : 'days';
  if (dayDelta > 0) return `${dayDelta} ${unit} apart`;
  return `${abs} ${unit} — wrong order`;
}

function lineageRow({glyph, title, placement, gap, tone, clickable, id}) {
  const dataAttr = id ? ` data-id="${id}"` : '';
  const cls = `lineage-row tone-${tone}${clickable ? ' clickable' : ''}`;
  return `
    <div class="${cls}"${dataAttr}>
      <span class="lr-glyph">${glyph}</span>
      <span class="lr-title">${escapeHtml(title)}</span>
      <span class="lr-meta">${placement}${gap ? ' · ' + gap : ''}</span>
    </div>`;
}

function renderLineagePanel() {
  const list = document.getElementById('warn-list');
  const focalId = focalBlockId();
  const b = focalId ? state.blocks.find(x => x.id === focalId) : null;
  if (!b) {
    state.selectedBlockIds = [];
    renderWarningsList();
    return;
  }
  const totalSelected = (state.selectedBlockIds || []).length;
  const moreNote = totalSelected > 1 ? ` <span class="ls-more">+${totalSelected - 1} more selected</span>` : '';

  let html = `
    <div class="lineage-back"><a href="#" class="back-link">← All warnings</a></div>
    <div class="lineage-group">
      <div class="lineage-label">SELECTED${moreNote}</div>
      <div class="lineage-selected">
        <div class="ls-title">${escapeHtml(b.ttl)}</div>
        <div class="ls-meta">Wk ${b.w} ${DAY_LABELS[b.d]} · ${formatTime(b.s)} · ${gradesLabel(b.grades)}</div>
      </div>
    </div>`;

  // Description section — read mode by default. The Edit button toggles to
  // a textarea; save on blur or Cmd/Ctrl+Enter, cancel on Escape. Persists
  // to b.desc with one undo entry per save (not per keystroke).
  const descTrim = (b.desc || '').trim();
  const descBody = descTrim
    ? `<div class="desc-text">${escapeHtml(b.desc)}</div>`
    : `<div class="desc-text empty">Add description…</div>`;
  html += `
    <div class="lineage-group" data-section="description">
      <div class="desc-hdr-row">
        <span class="lineage-label" style="margin: 0;">DESCRIPTION</span>
        <button class="desc-edit-btn" data-act="edit-desc">Edit</button>
      </div>
      <div data-role="desc-body">${descBody}</div>
    </div>`;

  // Standards section — only if b.std has entries. Each row: code + tier
  // badge. Click badge to flip tier (defensible <-> soft). Section header
  // shows live counts.
  if (Array.isArray(b.std) && b.std.length) {
    const defSet = new Set(Array.isArray(b.std_defensible) ? b.std_defensible : []);
    const defCount = b.std.filter(s => defSet.has(s)).length;
    const softCount = b.std.length - defCount;
    let stdRows = '';
    for (const code of b.std) {
      const isDef = defSet.has(code);
      const cls = isDef ? 'defensible' : 'soft';
      const label = isDef ? '✓ defensible' : '~ soft';
      stdRows += `<div class="std-row">
        <span class="std-code">${escapeHtml(code)}</span>
        <span class="tier-badge ${cls}" data-act="toggle-tier" data-code="${escapeHtml(code)}">${label}</span>
      </div>`;
    }
    html += `
      <div class="lineage-group" data-section="standards">
        <div class="lineage-label">STANDARDS (${defCount} defensible · ${softCount} soft)</div>
        ${stdRows}
      </div>`;
  }

  if (!b.tag) {
    html += `
      <div class="lineage-group"><div class="lineage-label">PREREQS (0)</div><div class="lineage-empty">— none —</div></div>
      <div class="lineage-group"><div class="lineage-label">DEPENDENTS (0)</div><div class="lineage-empty">— none —</div></div>`;
  } else {
    // PREREQS: tags the selected block needs
    const prereqTags = PREREQS[b.tag] || [];
    html += `<div class="lineage-group"><div class="lineage-label">PREREQS (${prereqTags.length})</div>`;
    if (!prereqTags.length) {
      html += `<div class="lineage-empty">— none —</div>`;
    } else {
      for (const pt of prereqTags) {
        const pBlocks = state.blocks.filter(x => x.tag === pt);
        if (!pBlocks.length) {
          html += lineageRow({glyph:'✗', title:`[${pt}]`, placement:'not placed', gap:'', tone:'bad', clickable:false});
          continue;
        }
        const earliest = pBlocks.reduce((m, x) => absMinLin(x) < absMinLin(m) ? x : m, pBlocks[0]);
        const st = prereqStatusVs(earliest, b);
        html += lineageRow({
          glyph: st.glyph, title: earliest.ttl,
          placement: `Wk ${earliest.w} ${DAY_LABELS[earliest.d]}`,
          gap: gapString(earliest, b),
          tone: st.tone, clickable: true, id: earliest.id,
        });
      }
    }
    html += `</div>`;

    // DEPENDENTS: tags that list b.tag as one of their prereqs
    const dependentEntries = [];
    for (const [childTag, parents] of Object.entries(PREREQS)) {
      if (parents.includes(b.tag)) {
        const cBlocks = state.blocks.filter(x => x.tag === childTag);
        if (!cBlocks.length) dependentEntries.push({tag: childTag, block: null});
        else {
          const earliest = cBlocks.reduce((m, x) => absMinLin(x) < absMinLin(m) ? x : m, cBlocks[0]);
          dependentEntries.push({tag: childTag, block: earliest});
        }
      }
    }
    html += `<div class="lineage-group"><div class="lineage-label">DEPENDENTS (${dependentEntries.length})</div>`;
    if (!dependentEntries.length) {
      html += `<div class="lineage-empty">— none —</div>`;
    } else {
      for (const d of dependentEntries) {
        if (!d.block) {
          html += lineageRow({glyph:'✗', title:`[${d.tag}]`, placement:'not placed', gap:'', tone:'bad', clickable:false});
          continue;
        }
        const st = dependentStatusVs(d.block, b);
        html += lineageRow({
          glyph: st.glyph, title: d.block.ttl,
          placement: `Wk ${d.block.w} ${DAY_LABELS[d.block.d]}`,
          gap: gapString(b, d.block),
          tone: st.tone, clickable: true, id: d.block.id,
        });
      }
    }
    html += `</div>`;
  }

  list.innerHTML = html;
  list.querySelector('.back-link').onclick = (e) => { e.preventDefault(); clearSelection(); };
  list.querySelectorAll('.lineage-row.clickable[data-id]').forEach(row => {
    row.onclick = () => focusAndReroot(row.dataset.id);
  });

  // Description edit/save flow. The button toggles between read mode
  // (showing escaped text) and edit mode (textarea). Save commits via
  // pushUndo with action type 'desc'; cancel reverts to the pre-edit value.
  const editBtn = list.querySelector('.desc-edit-btn[data-act="edit-desc"]');
  const descBodyEl = list.querySelector('[data-role="desc-body"]');
  if (editBtn && descBodyEl) {
    editBtn.onclick = () => {
      // If already in edit mode, treat the button as Done → save.
      if (editBtn.textContent === 'Done') {
        const ta = descBodyEl.querySelector('textarea.desc-edit');
        if (ta) commitDescEdit(b.id, ta.value);
        return;
      }
      const before = b.desc || '';
      descBodyEl.innerHTML = `<textarea class="desc-edit" spellcheck="true"></textarea>`;
      const ta = descBodyEl.querySelector('textarea');
      ta.value = before;
      ta.dataset.before = before;
      ta.focus();
      // Place cursor at end so Edit feels like "continue typing".
      ta.setSelectionRange(ta.value.length, ta.value.length);
      editBtn.textContent = 'Done';
      // Save on blur (clicking outside the textarea).
      ta.addEventListener('blur', () => {
        if (descBodyEl.contains(ta)) commitDescEdit(b.id, ta.value);
      });
      ta.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          e.preventDefault();
          // Revert: re-render with original value, no undo entry.
          renderLineagePanel();
        } else if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          commitDescEdit(b.id, ta.value);
        }
      });
      // Block pointer events from reaching the calendar's drag-start
      // logic. The textarea is outside .cal so drag wouldn't fire anyway,
      // but this guards against future DOM restructuring.
      ta.addEventListener('pointerdown', (e) => e.stopPropagation());
    };
  }

  // Tier toggle on standard badges. Each click flips defensible <-> soft
  // and pushes one undo entry with action type 'tier'.
  list.querySelectorAll('.tier-badge[data-act="toggle-tier"]').forEach(badge => {
    badge.onclick = () => {
      const code = badge.dataset.code;
      const target = state.blocks.find(x => x.id === b.id);
      if (!target) return;
      if (!Array.isArray(target.std_defensible)) target.std_defensible = [];
      const wasDefensible = target.std_defensible.includes(code);
      const before = wasDefensible ? 'defensible' : 'soft';
      const after  = wasDefensible ? 'soft' : 'defensible';
      if (wasDefensible) {
        target.std_defensible = target.std_defensible.filter(s => s !== code);
      } else {
        target.std_defensible = [...target.std_defensible, code];
      }
      pushUndo({ type: 'tier', blockId: b.id, std_code: code, before, after });
      saveState();
      renderLineagePanel();
    };
  });
}

// Commit a description edit. Pulls the canonical block from state, diffs
// against the pre-edit value, and only pushes an undo entry if the value
// actually changed (no-op edits don't pollute the undo stack).
function commitDescEdit(blockId, newValue) {
  const target = state.blocks.find(x => x.id === blockId);
  if (!target) return;
  const before = target.desc || '';
  const after = newValue;
  if (before === after) {
    renderLineagePanel();
    return;
  }
  target.desc = after;
  pushUndo({ type: 'desc', blockId, before, after });
  saveState();
  renderLineagePanel();
}

function renderPinReadiness() {
  const list = document.getElementById('warn-list');
  const pinB = state.blocks.find(x => x.id === state.selectedPinId);
  if (!pinB || !pinB.tag) { state.selectedPinId = null; renderWarningsList(); return; }

  const serviceTags = [];
  for (const [conceptTag, pinTag] of Object.entries(PIN_SERVICE)) {
    if (pinTag === pinB.tag) serviceTags.push(conceptTag);
  }

  const pinDayNum = (pinB.w - 1) * 7 + pinB.d;
  let readyCount = 0, flagCount = 0;
  const rowsHtml = [];
  for (const ct of serviceTags) {
    const cBlocks = state.blocks.filter(x => x.tag === ct);
    if (!cBlocks.length) {
      rowsHtml.push(lineageRow({glyph:'✗', title:`[${ct}]`, placement:'not placed', gap:'', tone:'bad', clickable:false}));
      flagCount++;
      continue;
    }
    const earliest = cBlocks.reduce((m, x) => absMinLin(x) < absMinLin(m) ? x : m, cBlocks[0]);
    const earlDayNum = (earliest.w - 1) * 7 + earliest.d;
    let st;
    if (earlDayNum < pinDayNum) { st = {glyph:'✓', tone:'ok'}; readyCount++; }
    else if (earlDayNum === pinDayNum) { st = {glyph:'⚠', tone:'warn'}; flagCount++; }
    else { st = {glyph:'✗', tone:'bad'}; flagCount++; }
    rowsHtml.push(lineageRow({
      glyph: st.glyph, title: earliest.ttl,
      placement: `Wk ${earliest.w} ${DAY_LABELS[earliest.d]}`,
      gap: gapString(earliest, pinB),
      tone: st.tone, clickable: true, id: earliest.id,
    }));
  }

  const total = serviceTags.length;
  let html = `
    <div class="lineage-back"><a href="#" class="back-link">← All warnings</a></div>
    <div class="lineage-group">
      <div class="lineage-label">PIN · Wk ${pinB.w} ${DAY_LABELS[pinB.d]}</div>
      <div class="lineage-selected">
        <div class="ls-title">${escapeHtml(pinB.ttl)}</div>
        <div class="ls-meta">${formatTime(pinB.s)}</div>
      </div>
    </div>
    <div class="lineage-group">
      <div class="lineage-label">READINESS (${total} prereq${total === 1 ? '' : 's'} for this pin)</div>
      ${total ? rowsHtml.join('') : '<div class="lineage-empty">— no mapped prereqs —</div>'}
    </div>
    <div class="lineage-summary">${readyCount} of ${total} ready · ${flagCount} flag${flagCount === 1 ? '' : 's'}</div>`;

  list.innerHTML = html;
  list.querySelector('.back-link').onclick = (e) => { e.preventDefault(); clearSelection(); };
  list.querySelectorAll('.lineage-row.clickable[data-id]').forEach(row => {
    row.onclick = () => focusAndReroot(row.dataset.id);
  });
}

// Jump to a block in the grid, switch weeks if needed, and re-root the lineage there.
function focusAndReroot(id) {
  const b = state.blocks.find(x => x.id === id);
  if (!b) return;
  state.selectedBlockIds = [id];
  state.selectedPinId = null;
  if (b.w !== state.currentWeek) state.currentWeek = b.w;
  saveState();
  render();
  setTimeout(() => {
    const el = cal.querySelector(`[data-id="${id}"]`);
    if (el) calWrap.scrollTo({top: el.offsetTop - 80, behavior: 'smooth'});
  }, 60);
}

function focusFirstBlock(id) {
  const b = state.blocks.find(x => x.id === id);
  if (!b) return;
  if (b.w !== state.currentWeek) {
    state.currentWeek = b.w;
    saveState();
    render();
    setTimeout(() => focusFirstBlock(id), 50);
    return;
  }
  // Scroll to it and highlight
  const el = cal.querySelector(`[data-id="${id}"]`);
  if (el) {
    calWrap.scrollTo({top: el.offsetTop - 80, behavior: 'smooth'});
    el.classList.add('selected');
    setTimeout(() => el.classList.remove('selected'), 2500);
  }
}

function renderGuideLegend() {
  const el = document.getElementById('guide-legend');
  const counts = {};
  for (const b of state.blocks) {
    if (b.guide) counts[b.guide] = (counts[b.guide] || 0) + 1;
  }
  const entries = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  if (!entries.length) {
    el.innerHTML = '<span style="color:var(--muted)">No guides assigned yet. Right-click any block to assign K, J, A, X.</span>';
  } else {
    el.innerHTML = entries.map(([g, n]) => `<span class="guide-badge guide-${g}">${g}</span> <span style="margin-right:10px">${n} blocks</span>`).join(' ');
  }
}

// ============================================================
// GUIDE SCHEDULE VIEW
// ============================================================
// Columns = guides (K, J, A, X, Unassigned). Rows = days of the selected week.
// Each cell stacks that guide's blocks for that day, sorted by start time.
// Blocks that overlap another block for the same guide on the same day get
// flagged with a red OVERLAP tag.
const GUIDE_ORDER = [
  { code: 'K', label: 'Kevin',    cls: 'guide-K' },
  { code: 'J', label: 'John',     cls: 'guide-J' },
  { code: 'A', label: 'Anand',    cls: 'guide-A' },
  { code: 'X', label: 'Other',    cls: 'guide-X' },
  { code: null, label: 'Unassigned', cls: 'guide-U' },
];

function renderGuideView() {
  const root = document.getElementById('guide-view');
  const week = state.currentWeek;
  const wkStart = WEEK_START_DATES[week];

  // Partition this week's blocks by guide + day
  const buckets = {}; // key `${guideKey}|${day}` → [blocks]
  for (const b of state.blocks) {
    if (b.w !== week) continue;
    const gk = b.guide || '_none';
    const key = `${gk}|${b.d}`;
    (buckets[key] = buckets[key] || []).push(b);
  }
  for (const k of Object.keys(buckets)) {
    buckets[k].sort((a, c) => a.s - c.s);
  }

  // Detect overlaps within each (guide, day) bucket
  const overlapIds = new Set();
  for (const k of Object.keys(buckets)) {
    const list = buckets[k];
    for (let i = 0; i < list.length; i++) {
      for (let j = i + 1; j < list.length; j++) {
        const a = list[i], c = list[j];
        if (a.s < c.s + c.dur && a.s + a.dur > c.s) {
          overlapIds.add(a.id);
          overlapIds.add(c.id);
        }
      }
    }
  }

  let html = `<h1>Guide schedule <span class="wk">Week ${week}${wkStart ? ' · starts ' + wkStart : ''}</span></h1>`;
  html += `<div class="guide-grid">`;
  // Header row: spacer + guide column headers
  html += `<div></div>`;
  for (const g of GUIDE_ORDER) {
    html += `<div class="col-head ${g.cls}">${g.label}${g.code ? ' · ' + g.code : ''}</div>`;
  }
  // Day rows
  for (let d = 0; d < 5; d++) {
    html += `<div class="row-head">${DAY_LABELS[d]}</div>`;
    for (const g of GUIDE_ORDER) {
      const gk = g.code || '_none';
      const list = buckets[`${gk}|${d}`] || [];
      if (!list.length) {
        html += `<div class="cell empty"></div>`;
        continue;
      }
      html += `<div class="cell">`;
      for (const b of list) {
        const isOverlap = overlapIds.has(b.id);
        html += `
          <div class="gcard t-${b.tp}${isOverlap ? ' overlap' : ''}" data-id="${b.id}">
            ${isOverlap ? '<span class="overlap-tag">OVERLAP</span>' : ''}
            <div class="tm">${formatTime(b.s)}–${formatTime(b.s + b.dur)}</div>
            <div class="tt">${escapeHtml(b.ttl)}</div>
            <div class="gr">${gradesLabel(b.grades)} · ${b.dur}m${b.pin ? ' · PIN' : ''}</div>
          </div>`;
      }
      html += `</div>`;
    }
  }
  html += `</div>`;

  root.innerHTML = html;

  // Wire up per-card interactions: right-click to change guide, left-click to
  // jump back to grid view scrolled to this block.
  root.querySelectorAll('.gcard').forEach(card => {
    const id = card.dataset.id;
    const b = state.blocks.find(x => x.id === id);
    if (!b) return;
    card.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      openGuideMenu(e, b);
    });
    card.addEventListener('click', () => {
      state.viewMode = 'grid';
      saveState();
      syncHeaderControls();
      swapViewVisibility();
      render();
      setTimeout(() => focusFirstBlock(id), 80);
    });
  });
}

// ============================================================
// HEADER CONTROLS
// ============================================================
function syncHeaderControls() {
  document.querySelectorAll('#view-seg button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === state.viewMode);
  });
  document.querySelectorAll('#guide-seg button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.gf === (state.guideFilter || 'all'));
  });
}

function swapViewVisibility() {
  const calWrapEl = document.getElementById('cal-wrap');
  const gvEl = document.getElementById('guide-view');
  calWrapEl.style.display = (state.viewMode === 'guide') ? 'none'  : 'block';
  gvEl.style.display      = (state.viewMode === 'guide') ? 'block' : 'none';
}

document.querySelectorAll('#view-seg button').forEach(btn => {
  btn.onclick = () => {
    state.viewMode = btn.dataset.view;
    saveState();
    syncHeaderControls();
    swapViewVisibility();
    render();
  };
});
document.querySelectorAll('#guide-seg button').forEach(btn => {
  btn.onclick = () => {
    state.guideFilter = btn.dataset.gf;
    saveState();
    syncHeaderControls();
    render();
  };
});

// ============================================================
// TOP-LEVEL RENDER
// ============================================================
function render() {
  syncHeaderControls();
  swapViewVisibility();
  renderWeekTabs();
  renderGradePills();
  renderGuideLegend();
  renderSidePanel();
  if (state.viewMode === 'guide') {
    renderGuideView();
  } else {
    renderCalendar();
    // After DOM is populated, measure columns and position blocks
    requestAnimationFrame(positionBlocksAfterMount);
  }
}

// Dispatch warn-list content based on selection. warn-summary stays constant.
function renderSidePanel() {
  renderWarnSummary();
  if (focalBlockId())             renderLineagePanel();
  else if (state.selectedPinId)   renderPinReadiness();
  else                            renderWarningsList();
}

// ============================================================
// ACTIONS — Reset, Export, Import (now reachable from ⋯ overflow menu)
// ============================================================
function doReset() {
  if (!confirm('Reset to the original spreadsheet layout? This discards all moves, guide assignments, and grade configuration.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  render();
}
function doExportJson() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `challenge-schedule-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function doImportJson() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    try {
      const txt = await f.text();
      const parsed = JSON.parse(txt);
      if (parsed && parsed.blocks && Array.isArray(parsed.blocks)) {
        state = parsed;
        // Defensive: ensure new fields exist on imported state
        if (!Array.isArray(state.grades) || !state.grades.length) state.grades = [{id:'G5',label:'G5'},{id:'G6',label:'G6'}];
        if (!Array.isArray(state.visibleGradeIds) || !state.visibleGradeIds.length) state.visibleGradeIds = state.grades.map(g => g.id);
        if (!Array.isArray(state.selectedBlockIds)) state.selectedBlockIds = [];
        for (const b of state.blocks) {
          if (!Array.isArray(b.grades)) b.grades = (typeof b.g === 'string') ? b.g.split('+') : ['G5'];
          delete b.g;
          if (b.locked === undefined) b.locked = !!b.anc;
          if (typeof b.desc !== 'string') b.desc = '';
          if (!Array.isArray(b.std_defensible)) b.std_defensible = [];
          const stdSet = new Set(Array.isArray(b.std) ? b.std : []);
          b.std_defensible = b.std_defensible.filter(s => stdSet.has(s));
        }
        saveState();
        render();
      } else {
        alert('Invalid file format.');
      }
    } catch(err) {
      alert('Could not read file: ' + err.message);
    }
  };
  input.click();
}

// ============================================================
// OVERFLOW MENU
// ============================================================
let overflowMenuEl = null;
let gradeConfigPanelEl = null;
function closeOverflowMenu() {
  if (overflowMenuEl) { overflowMenuEl.remove(); overflowMenuEl = null; }
}
function closeGradeConfigPanel() {
  if (gradeConfigPanelEl) { gradeConfigPanelEl.remove(); gradeConfigPanelEl = null; }
}
function openOverflowMenu() {
  closeOverflowMenu();
  closeGradeConfigPanel();
  const menu = document.createElement('div');
  menu.className = 'overflow-menu';
  menu.innerHTML = `
    <button data-act="config-grades">Configure grades…</button>
    <div class="sep"></div>
    <button data-act="import">Import JSON</button>
    <button data-act="export">Export JSON</button>
    <div class="sep"></div>
    <button data-act="reset" class="danger">Reset to spreadsheet…</button>
  `;
  document.body.appendChild(menu);
  overflowMenuEl = menu;
  // Position under the ⋯ button
  const btn = document.getElementById('btn-overflow');
  if (btn) {
    const r = btn.getBoundingClientRect();
    menu.style.top  = (r.bottom + 2) + 'px';
    menu.style.right = (window.innerWidth - r.right) + 'px';
  }
  menu.addEventListener('click', (e) => {
    const b = e.target.closest('button[data-act]');
    if (!b) return;
    const act = b.dataset.act;
    closeOverflowMenu();
    if (act === 'config-grades') openGradeConfigPanel();
    else if (act === 'import') doImportJson();
    else if (act === 'export') doExportJson();
    else if (act === 'reset')  doReset();
  });
  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', onOutsideOverflowClick, { once: true });
  }, 10);
}
function onOutsideOverflowClick(e) {
  if (!overflowMenuEl) return;
  if (overflowMenuEl.contains(e.target)) {
    // re-arm the once-listener if click was inside (button handler already
    // closed the menu in most cases, but for safety we reschedule)
    return;
  }
  closeOverflowMenu();
}

// ============================================================
// GRADE CONFIG PANEL — opens from overflow → "Configure grades…"
// ============================================================
function openGradeConfigPanel() {
  closeGradeConfigPanel();
  const panel = document.createElement('div');
  panel.className = 'grade-config-panel';
  document.body.appendChild(panel);
  gradeConfigPanelEl = panel;
  renderGradeConfigPanel();
  // Position under the ⋯ button
  const btn = document.getElementById('btn-overflow');
  if (btn) {
    const r = btn.getBoundingClientRect();
    panel.style.top  = (r.bottom + 2) + 'px';
    panel.style.right = (window.innerWidth - r.right) + 'px';
  }
  setTimeout(() => {
    document.addEventListener('click', onOutsideGradeConfigClick);
  }, 10);
}
function onOutsideGradeConfigClick(e) {
  if (!gradeConfigPanelEl) {
    document.removeEventListener('click', onOutsideGradeConfigClick);
    return;
  }
  if (gradeConfigPanelEl.contains(e.target)) return;
  // Don't close if click was on the overflow button (toggle behavior is
  // handled by the button itself).
  const btn = document.getElementById('btn-overflow');
  if (btn && btn.contains(e.target)) return;
  closeGradeConfigPanel();
  document.removeEventListener('click', onOutsideGradeConfigClick);
}
function renderGradeConfigPanel() {
  if (!gradeConfigPanelEl) return;
  const rows = state.grades.map((g, i) => {
    const usage = gradeUsageCount(g.id);
    const canDelete = usage === 0 && state.grades.length > 1;
    return `
      <div class="grade-config-row" data-id="${g.id}">
        <div class="gc-arrows">
          <button class="gc-arrow gc-up" ${i === 0 ? 'disabled' : ''} title="Move up">▲</button>
          <button class="gc-arrow gc-down" ${i === state.grades.length - 1 ? 'disabled' : ''} title="Move down">▼</button>
        </div>
        <div class="gc-label" contenteditable="true" spellcheck="false">${escapeHtml(g.label)}</div>
        <div class="gc-usage">${usage} block${usage === 1 ? '' : 's'}</div>
        <button class="gc-delete" ${canDelete ? '' : 'disabled'} title="${canDelete ? 'Delete grade' : (usage > 0 ? 'Remove from blocks first' : 'At least one grade required')}">×</button>
      </div>
    `;
  }).join('');
  gradeConfigPanelEl.innerHTML = `
    <h3>Grades</h3>
    <div class="gc-list">${rows}</div>
    <div class="gc-actions">
      <button class="gc-add">+ Add grade</button>
      <button class="gc-done">Done</button>
    </div>
  `;
  // Wire row buttons
  gradeConfigPanelEl.querySelectorAll('.grade-config-row').forEach(row => {
    const id = row.dataset.id;
    const idx = state.grades.findIndex(g => g.id === id);
    row.querySelector('.gc-up').onclick = () => moveGrade(id, -1);
    row.querySelector('.gc-down').onclick = () => moveGrade(id, +1);
    row.querySelector('.gc-delete').onclick = () => deleteGrade(id);
    const labelEl = row.querySelector('.gc-label');
    labelEl.addEventListener('blur', () => {
      const newLabel = labelEl.textContent.trim();
      if (newLabel && newLabel !== state.grades[idx].label) {
        state.grades[idx].label = newLabel;
        saveState();
        render();
        renderGradeConfigPanel();
      }
    });
    labelEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); labelEl.blur(); }
    });
  });
  gradeConfigPanelEl.querySelector('.gc-add').onclick = () => promptAddGrade();
  gradeConfigPanelEl.querySelector('.gc-done').onclick = () => {
    closeGradeConfigPanel();
    document.removeEventListener('click', onOutsideGradeConfigClick);
  };
}
function moveGrade(id, dir) {
  const i = state.grades.findIndex(g => g.id === id);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= state.grades.length) return;
  const tmp = state.grades[i];
  state.grades[i] = state.grades[j];
  state.grades[j] = tmp;
  saveState();
  render();
  renderGradeConfigPanel();
}
function deleteGrade(id) {
  if (gradeUsageCount(id) > 0) return;
  if (state.grades.length <= 1) return;
  state.grades = state.grades.filter(g => g.id !== id);
  state.visibleGradeIds = state.visibleGradeIds.filter(x => x !== id);
  if (!state.visibleGradeIds.length) state.visibleGradeIds = state.grades.map(g => g.id);
  saveState();
  render();
  renderGradeConfigPanel();
}
function promptAddGrade() {
  const label = prompt('Grade label (e.g. "G7"):');
  if (!label) return;
  const trimmed = label.trim();
  if (!trimmed) return;
  const id = slugifyGradeLabel(trimmed);
  state.grades.push({ id, label: trimmed });
  state.visibleGradeIds.push(id);
  saveState();
  render();
  renderGradeConfigPanel();
}

// ============================================================
// GRADE VISIBILITY PILLS (row 2)
// ============================================================
function renderGradePills() {
  const wrap = document.getElementById('grade-pills');
  if (!wrap) return;
  wrap.innerHTML = '';
  const visSet = new Set(state.visibleGradeIds || []);
  for (const g of state.grades) {
    const pill = document.createElement('button');
    pill.className = 'grade-pill' + (visSet.has(g.id) ? ' visible' : '');
    pill.textContent = g.label;
    pill.title = visSet.has(g.id) ? 'Click to hide' : 'Click to show';
    pill.onclick = () => toggleGradeVisibility(g.id);
    wrap.appendChild(pill);
  }
}
function toggleGradeVisibility(gid) {
  const cur = state.visibleGradeIds || [];
  const isVis = cur.includes(gid);
  if (isVis) {
    if (cur.length <= 1) return; // can't hide the last visible grade
    state.visibleGradeIds = cur.filter(x => x !== gid);
  } else {
    state.visibleGradeIds = [...cur, gid];
    // Re-sort to canonical order
    state.visibleGradeIds.sort((a, b) => gradeIndex(a) - gradeIndex(b));
  }
  saveState();
  render();
}

// Wire toolbar buttons
document.getElementById('btn-overflow').onclick = (e) => {
  e.stopPropagation();
  if (overflowMenuEl) closeOverflowMenu();
  else if (gradeConfigPanelEl) closeGradeConfigPanel();
  else openOverflowMenu();
};
document.getElementById('btn-add-grade').onclick = (e) => {
  e.stopPropagation();
  promptAddGrade();
};

// Initial render
render();
window.addEventListener('resize', () => {
  if (state.viewMode === 'grid') {
    requestAnimationFrame(positionBlocksAfterMount);
  }
});

// Global keyboard:
//  - Escape clears selection
//  - Cmd/Ctrl+Z undoes; Cmd/Ctrl+Shift+Z (or Ctrl+Y) redoes
//  - 'L' (no modifier) toggles lock on the focal selected block
document.addEventListener('keydown', (e) => {
  // Defensive: don't intercept while typing in an input (none exist today
  // but this prevents future regressions).
  const t = e.target;
  if (t && (['INPUT','TEXTAREA','SELECT'].includes(t.tagName) || t.isContentEditable)) return;

  if (e.key === 'Escape') {
    if (overflowMenuEl) { closeOverflowMenu(); return; }
    if (gradeConfigPanelEl) { closeGradeConfigPanel(); return; }
    clearSelection();
    return;
  }

  const mod = e.ctrlKey || e.metaKey;
  // Cut / Copy / Paste — only when no text is selected and target isn't an
  // input (the input check at the top of this handler already filters those,
  // but shouldHandleClipboard also rejects active text selections so native
  // copy still works on the lineage panel etc.).
  if (mod && (e.key === 'c' || e.key === 'C') && !e.shiftKey) {
    if (!shouldHandleClipboard(e)) return;
    if (copySelection()) e.preventDefault();
    return;
  }
  if (mod && (e.key === 'x' || e.key === 'X') && !e.shiftKey) {
    if (!shouldHandleClipboard(e)) return;
    if ((state.selectedBlockIds || []).length) {
      e.preventDefault();
      cutSelection();
    }
    return;
  }
  if (mod && (e.key === 'v' || e.key === 'V') && !e.shiftKey) {
    if (!shouldHandleClipboard(e)) return;
    if (clipboard.length) {
      e.preventDefault();
      pasteClipboard();
    }
    return;
  }

  if (mod && (e.key === 'z' || e.key === 'Z') && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if (mod && (e.key === 'z' || e.key === 'Z') &&  e.shiftKey) { e.preventDefault(); redo(); return; }
  if (mod && (e.key === 'y' || e.key === 'Y'))                { e.preventDefault(); redo(); return; }

  // 'L' toggles lock on the focal block. No modifier; modifier presence
  // means the user intended a different shortcut.
  if (!mod && (e.key === 'l' || e.key === 'L')) {
    const id = focalBlockId();
    if (!id) return;
    const b = state.blocks.find(x => x.id === id);
    if (!b) return;
    const before = !!b.locked;
    const after = !before;
    b.locked = after;
    pushUndo({ type: 'lock', blockId: b.id, before, after });
    saveState();
    render();
    e.preventDefault();
  }
});

// Clicking empty grid space (a .slot with no block above it) clears selection.
// Blocks stop propagation via their own handlers, so this only fires for bare
// slots, time ticks, and the time-corner cell.
cal.addEventListener('click', (e) => {
  if (e.target.closest('.block')) return;
  if (e.target.closest('.pin-label')) return;
  clearSelection();
});
</script>
</body>
</html>
