    return b;
  }
  function migrate(b) {
    return ensureStdDefensible(ensureDesc(ensureLocked(ensureGrades(b))));
  }

  const DEFAULT_GRADES = [{id:'G5', label:'G5'}, {id:'G6', label:'G6'}];
  const DEFAULT_VISIBLE = ['G5', 'G6'];

  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : (typeof PUBLISHED_STATE !== 'undefined' ? PUBLISHED_STATE : null);
    if (true) {
      if (parsed && parsed.blocks && Array.isArray(parsed.blocks) && parsed.blocks.length) {
        // parsed.blocks (PUBLISHED_STATE or saved localStorage) is the
        // authoritative source. We do NOT merge with INITIAL_BLOCKS because
        // INITIAL_BLOCKS may contain stale entries (blocks intentionally
        // removed in a schema bump). Merging would silently restore those
        // ghost blocks, producing duplicate / wrong-position layouts.
        // Tradeoff: editing _INITIAL_BLOCKS_RAW alone is no longer enough;
        // the new blocks must also be in PUBLISHED_STATE — which is
        // already what publish.py does.
        const byId = {};
        for (const sb of parsed.blocks) {
          if (DROPPED_IDS.has(sb.id)) continue;
          byId[sb.id] = migrate({...sb});
        }
        // Selection migration: old format used selectedBlockId (single string),
        // new uses selectedBlockIds (array). Convert if the old key is present.
        let selIds;
        if (Array.isArray(parsed.selectedBlockIds)) selIds = parsed.selectedBlockIds.filter(x => typeof x === 'string');
        else if (typeof parsed.selectedBlockId === 'string') selIds = [parsed.selectedBlockId];
        else selIds = [];
        // Grades: persisted, otherwise default
        const grades = (Array.isArray(parsed.grades) && parsed.grades.every(g => g && g.id && g.label))
          ? parsed.grades
          : DEFAULT_GRADES.map(g => ({...g}));
        const validIds = new Set(grades.map(g => g.id));
        const visibleGradeIds = (Array.isArray(parsed.visibleGradeIds) && parsed.visibleGradeIds.length > 0)
          ? parsed.visibleGradeIds.filter(id => validIds.has(id))
          : grades.map(g => g.id);
        // Safety: if filtering left it empty (e.g. saved visibility points to
        // grades that no longer exist), fall back to all visible.
        const finalVisible = visibleGradeIds.length ? visibleGradeIds : grades.map(g => g.id);
        return {
          blocks: Object.values(byId),
          currentWeek: parsed.currentWeek || 1,
          viewMode: parsed.viewMode === 'guide' ? 'guide' : 'grid',
          guideFilter: parsed.guideFilter || 'all',
          selectedBlockIds: selIds,
          selectedPinId: parsed.selectedPinId || null,
          fullChallenge: !!parsed.fullChallenge,
          grades,
          visibleGradeIds: finalVisible,
          __schema_version: parsed.__schema_version || null,
        };
      }
    }
  } catch(e) {}
  return {
    blocks: INITIAL_BLOCKS.map(b => migrate({...b})),
    currentWeek: 1,
    viewMode: 'grid',
    guideFilter: 'all',
    selectedBlockIds: [],
    selectedPinId: null,
    fullChallenge: false,
    grades: DEFAULT_GRADES.map(g => ({...g})),
    visibleGradeIds: DEFAULT_VISIBLE.slice(),
    __schema_version: null,
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { console.warn('Could not save state', e); }
  if (!_syncSuppressRemote) scheduleRemoteSync();
}

// ============================================================
// RENDER
// ============================================================
const cal = document.getElementById('cal');
const calWrap = document.getElementById('cal-wrap');

function dayOffset(week, day) {
  // Days since start of Week 1 Mon (Sep 7 2026)
  return (week - 1) * 7 + day;
}

function blockDateStr(b) {
  // compute date for a block
  const wk = WEEK_START_DATES[b.w];
  if (!wk) return '';
  const d = new Date(wk + 'T00:00:00');
  d.setDate(d.getDate() + b.d);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function renderWeekTabs() {
  const tabs = document.getElementById('week-tabs');
  tabs.innerHTML = '';
  const warningsByWeek = computeWarningsByWeek();
  const pinWeeks = new Set();
  for (const b of state.blocks) { if (b.pin) pinWeeks.add(b.w); }

  // Full challenge tab — position 0, active when state.fullChallenge is on
  const fullBtn = document.createElement('button');
  fullBtn.className = 'week-tab full-challenge-tab' + (state.fullChallenge ? ' active' : '');
  const totalWarn = Object.values(warningsByWeek).reduce((a, b) => a + b, 0);
  const anyPin = pinWeeks.size > 0 ? '<span class="pin-glyph" title="contains pin days">⚑</span>' : '';
  fullBtn.innerHTML = `${anyPin}Full challenge${totalWarn > 0 ? `<span class="count">${totalWarn}</span>` : ''}`;
  fullBtn.onclick = () => { state.fullChallenge = true; saveState(); render(); };
  tabs.appendChild(fullBtn);

  // Numbered week tabs — active when NOT in full-challenge mode and matching currentWeek
  for (let w = 1; w <= 8; w++) {
    const btn = document.createElement('button');
    const isActive = !state.fullChallenge && state.currentWeek === w;
    btn.className = 'week-tab' + (isActive ? ' active' : '');
    const wct = warningsByWeek[w] || 0;
    const pin = pinWeeks.has(w) ? '<span class="pin-glyph" title="contains pin day">⚑</span>' : '';
    btn.innerHTML = `${pin}Wk ${w}${wct > 0 ? `<span class="count">${wct}</span>` : ''}`;
    btn.onclick = () => { state.fullChallenge = false; state.currentWeek = w; saveState(); render(); };
    tabs.appendChild(btn);
  }
}

function renderCalendar() {
  cal.innerHTML = '';
  const weeksToRender = state.fullChallenge ? [1,2,3,4,5,6,7,8] : [state.currentWeek];
  const visGrades = visibleGrades();
  const N = visGrades.length;  // grade columns per day
  if (N === 0) return; // safety; visibility constraint should prevent this
  const totalGradeCols = weeksToRender.length * 5 * N;

  // Update the grid template so horizontal width matches the week count × days × visible grades.
  cal.style.gridTemplateColumns = `54px repeat(${totalGradeCols}, var(--col-w))`;
  // Row 1 = week banner (only used in full challenge). Row 2 = day headers.
  // Row 3 = grade subheaders. Rows 4..(4+SLOTS_PER_DAY-1) = slot grid.
  const bannerRowHeight = state.fullChallenge ? '26px' : '0';
  cal.style.gridTemplateRows = `${bannerRowHeight} auto auto repeat(${SLOTS_PER_DAY}, var(--slot-h))`;
  cal.classList.toggle('full-challenge', !!state.fullChallenge);

  // Build header cells
  const timeCorner = document.createElement('div');
  timeCorner.className = 'hdr time-corner';
  timeCorner.style.gridRow = '1 / 4';  // span banner + day + grade rows
  timeCorner.style.gridColumn = '1';
  cal.appendChild(timeCorner);

  // Per-week header construction
  weeksToRender.forEach((week, weekIndex) => {
    const weekStart = new Date(WEEK_START_DATES[week] + 'T00:00:00');
    const colsPerWeek = 5 * N;
    const weekColStart = 2 + weekIndex * colsPerWeek;   // first grade column for this week
    const weekColEnd   = weekColStart + colsPerWeek;    // exclusive

    // Week banner — only visible in full challenge mode
    if (state.fullChallenge) {
      const banner = document.createElement('div');
      banner.className = 'hdr week-banner';
      banner.dataset.week = week;
      banner.style.gridRow = '1';
      banner.style.gridColumn = `${weekColStart} / ${weekColEnd}`;
      const dateStr = weekStart.toLocaleDateString('en-US', {month:'short', day:'numeric'});
      banner.innerHTML = `<span class="wb-num">Wk ${week}</span> <span class="wb-date">${dateStr}</span>`;
      banner.onclick = () => {
        state.fullChallenge = false;
        state.currentWeek = week;
        saveState();
        render();
      };
      cal.appendChild(banner);
    }

    for (let d = 0; d < 5; d++) {
      const date = new Date(weekStart);
      date.setDate(date.getDate() + d);
      const dateStr = date.toLocaleDateString('en-US', {month:'short', day:'numeric'});

      // Earliest pin block for this (week, day), if any
      const pinsThisDay = state.blocks
        .filter(b => b.w === week && b.d === d && b.pin)
        .sort((a, b) => a.s - b.s);
      const pinBlock = pinsThisDay[0] || null;
      let pinLine = '';
      if (pinBlock) {
        const fullTitle = pinBlock.ttl;
        const shortTitle = fullTitle.length > 24 ? fullTitle.slice(0, 22) + '…' : fullTitle;
        pinLine = `<div class="pin-label" data-pin-id="${pinBlock.id}" title="${escapeHtml(fullTitle)}">↓ PIN: ${escapeHtml(shortTitle)}</div>`;
      }

      const dayCol = weekColStart + d * N; // first column for this day

      const dayHdr = document.createElement('div');
      dayHdr.className = 'hdr day';
      dayHdr.dataset.week = week;
      dayHdr.dataset.day = d;
      dayHdr.style.gridRow = '2';
      dayHdr.style.gridColumn = `${dayCol} / ${dayCol + N}`;
      dayHdr.innerHTML = `${DAY_LABELS[d]} <span class="day-dates">${dateStr}</span>${pinLine}`;
      if (pinBlock) {
        dayHdr.addEventListener('click', (e) => {
          const pl = e.target.closest('.pin-label');
          if (pl) { e.stopPropagation(); selectPin(pl.dataset.pinId); }
        });
      }
      cal.appendChild(dayHdr);

      // One grade subheader per visible grade
      visGrades.forEach((g, gi) => {
        const gh = document.createElement('div');
        gh.className = 'hdr grade';
        gh.dataset.week = week;
        gh.dataset.day = d;
        gh.dataset.grade = g.id;
        gh.style.gridRow = '3';
        gh.style.gridColumn = `${dayCol + gi}`;
        gh.textContent = g.label;
        cal.appendChild(gh);
      });
    }

    // Grade columns (N per day × 5 days per week)
    for (let d = 0; d < 5; d++) {
      visGrades.forEach((g, gi) => {
        const col = document.createElement('div');
        col.className = 'grade-col';
        col.style.gridRow = `4 / ${4 + SLOTS_PER_DAY}`;
        col.style.gridColumn = `${weekColStart + d * N + gi}`;
        col.dataset.week = week;
        col.dataset.day = d;
        col.dataset.grade = g.id;
        for (let slot = 0; slot < SLOTS_PER_DAY; slot++) {
          const min = DAY_START_MIN + slot * SLOT_MIN;
          const isMajor = min % 60 === 0;
          const isHalf = !isMajor && (min % 30 === 0);
          const s = document.createElement('div');
          s.className = 'slot' + (isMajor ? ' major' : (isHalf ? ' half' : ''));
          col.appendChild(s);
        }
        cal.appendChild(col);
      });
    }
  });

  // Time column (single, on the left) — row 4 onwards
  const tcol = document.createElement('div');
  tcol.className = 'time-col';
  tcol.style.gridRow = `4 / ${4 + SLOTS_PER_DAY}`;
  tcol.style.gridColumn = '1';
  for (let slot = 0; slot < SLOTS_PER_DAY; slot++) {
    const min = DAY_START_MIN + slot * SLOT_MIN;
    const hh = 9 + Math.floor(min / 60);
    const mm = min % 60;
    const isMajor = mm === 0;
    const isHalf = mm === 30;
    const label = isMajor ? `${hh > 12 ? hh-12 : hh}:00 ${hh >= 12 ? 'PM' : 'AM'}`
                : isHalf ? `:30` : '';
    const tick = document.createElement('div');
    tick.className = 'time-tick' + (isMajor ? ' major' : isHalf ? ' half' : '');
    tick.textContent = label;
    tcol.appendChild(tick);
  }
  cal.appendChild(tcol);

  // Blocks for the weeks in view. Skip blocks whose visible grade range is empty.
  const warnings = computeWarnings();
  const warnByBlock = {};
  for (const w of warnings) for (const bid of w.block_ids) { warnByBlock[bid] = (warnByBlock[bid] || []).concat(w); }

  const weekSet = new Set(weeksToRender);
  for (const b of state.blocks) {
    if (!weekSet.has(b.w)) continue;
    if (visibleGradeRange(b).length === 0) continue;
    renderBlock(b, warnByBlock[b.id]);
  }
}

function renderBlock(b, warns) {
  const el = document.createElement('div');
  el.className = `block t-${b.tp}`;
  if (b.locked) el.classList.add('locked');
  if (b.pin) el.classList.add('pin');
  if (warns && warns.length) el.classList.add('violated');
  if (hasHiddenGrades(b)) el.classList.add('has-hidden-grades');
  el.dataset.id = b.id;

  // Vertical sizing is slot-based and doesn't depend on column measurements.
  // Horizontal position (left/width) is assigned later in positionBlocksAfterMount()
  // from runtime-measured column edges, so we no longer guess pixel math here.
  const startSlot = Math.max(0, (b.s - DAY_START_MIN) / SLOT_MIN);
  const slots = Math.max(1, b.dur / SLOT_MIN);
  el.dataset.startSlot = startSlot;
  el.dataset.slots = slots;
  el.dataset.week = b.w;
  el.dataset.day = b.d;
  // Store grades as comma-separated for any downstream readers; b.grades is the source.
  el.dataset.grades = (b.grades || []).join(',');

  el.style.height = (slots * SLOT_PX) + 'px';
  el.style.visibility = 'hidden'; // revealed in positionBlocksAfterMount once measured
  // left, width, top → computed in positionBlocksAfterMount()

  // Content
  const meta = `${formatTime(b.s)}–${formatTime(b.s + b.dur)} · ${gradesLabel(b.grades)} · ${b.dur}m`;
  // Inline lock glyph — small, padlock-shaped, sits in the top-right corner
  // without overlapping the title. SVG keeps it crisp and avoids emoji
  // rendering inconsistencies across platforms.
  const lockGlyph = b.locked ? `
    <svg class="lock-glyph" viewBox="0 0 12 14" aria-hidden="true">
      <path d="M3 6V4a3 3 0 0 1 6 0v2h.5A1.5 1.5 0 0 1 11 7.5v4A1.5 1.5 0 0 1 9.5 13h-7A1.5 1.5 0 0 1 1 11.5v-4A1.5 1.5 0 0 1 2.5 6H3zm1.2 0h3.6V4a1.8 1.8 0 0 0-3.6 0v2z"/>
    </svg>` : '';
  el.innerHTML = `
    ${lockGlyph}
    <div class="ttl">${escapeHtml(b.ttl)}${b.guide ? `<span class="guide-badge guide-${b.guide}">${b.guide}</span>` : ''}</div>
    <div class="meta">${meta}</div>
    ${b.std && b.std.length ? `<div class="std">${escapeHtml(b.std.join(', '))}</div>` : ''}
  `;

  // Click handler is attached for ALL blocks (locked or not). Cmd/Ctrl+click
  // toggles selection; plain click replaces. attachDrag is only attached
  // for non-locked blocks — it owns its own pointerup-as-click path that
  // selects when no movement happened.
  if (!b.locked) {
    attachDrag(el, b);
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      openGuideMenu(e, b);
    });
  } else {
    // Locked blocks can't drag, but should still be selectable + cmd-clickable.
    el.addEventListener('click', (e) => {
      if (e.button !== 0) return;
      if (e.metaKey || e.ctrlKey) toggleBlockInSelection(b.id);
      else selectBlock(b.id);
    });
    // Right-click on a locked block prompts for the unlock code. This is a
    // soft guard against accidental edits to anchor blocks (lunch, movement,
    // wraps, PINs) — not security. Code is shared knowledge, not a secret.
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const code = prompt('This block is locked. Enter unlock code to edit:');
      if (code === null) return; // cancelled
      if (code.trim().toLowerCase() === 'forge') {
        b.locked = false;
        pushUndo({ type: 'lock', blockId: b.id, before: true, after: false });
        saveState();
        render();
      } else {
        alert('Wrong code. Block stays locked.');
      }
    });
  }

  if (warns && warns.length) {
    el.title = warns.map(w => `[${w.kind.toUpperCase()}] ${w.msg}`).join('\n');
  }

  cal.appendChild(el);
}

// ============================================================
// RUNTIME COLUMN MEASUREMENT
// ============================================================
// We measure each grade column's actual left/right in pixels (relative to
// cal's content box) instead of trusting fixed-width math.
//
// Shape: columnMetrics[week][day][gradeId] = { left, right }
// In single-week mode only one week key is populated. In full-challenge
// mode all 8 weeks are populated. Only VISIBLE grades have entries
// (because only their .grade-col elements exist in the DOM).
let columnMetrics = {};
let weeksRendered = [];    // ordered list of weeks currently in the DOM
let headerHeight = 40;

function measureColumns() {
  const calRect = cal.getBoundingClientRect();
  const metrics = {};
  const seenWeeks = new Set();
  for (const el of cal.querySelectorAll('.grade-col')) {
    const w = parseInt(el.dataset.week, 10);
    const d = parseInt(el.dataset.day, 10);
    const g = el.dataset.grade;
    seenWeeks.add(w);
    if (!metrics[w]) metrics[w] = {};
    if (!metrics[w][d]) metrics[w][d] = {};
    const r = el.getBoundingClientRect();
    metrics[w][d][g] = { left: r.left - calRect.left, right: r.right - calRect.left };
  }
  columnMetrics = metrics;
  weeksRendered = [...seenWeeks].sort((a, b) => a - b);

  const tc = cal.querySelector('.hdr.time-corner');
  headerHeight = tc ? tc.getBoundingClientRect().height : 40;
}

// Returns the leftmost visible grade id at (week, day), or null if none
// of that day's columns are rendered. Used to identify "first column of
// the day" for day-boundary inset / separator math.
function leftmostGradeAt(week, day) {
  const m = columnMetrics[week] && columnMetrics[week][day];
  if (!m) return null;
  for (const g of state.grades) {
    if (m[g.id]) return g.id;
  }
  return null;
}

function rightmostGradeAt(week, day) {
  const m = columnMetrics[week] && columnMetrics[week][day];
  if (!m) return null;
  let last = null;
  for (const g of state.grades) {
    if (m[g.id]) last = g.id;
  }
  return last;
}

// Compute a block's target {left, width} from measured column edges.
// Spans from the leftmost visible grade in b.grades to the rightmost.
// Applies the DAY_INSET/GRADE_INSET margins AND a hard right-edge clamp that
// guarantees the block never reaches within 6px of the next day's column.
function blockBounds(b) {
  const weekMetrics = columnMetrics[b.w];
  if (!weekMetrics) return null;
  const m = weekMetrics[b.d];
  if (!m) return null;

  const visRange = visibleGradeRange(b);
  if (!visRange.length) return null;
  const firstG = visRange[0];
  const lastG  = visRange[visRange.length - 1];
  const colFirst = m[firstG];
  const colLast  = m[lastG];
  if (!colFirst || !colLast) return null;

  const DAY_INSET   = 4;  // px inset at a day boundary
  const GRADE_INSET = 2;  // px inset at the within-day grade-to-grade boundary

  const dayLeft  = leftmostGradeAt(b.w, b.d);
  const dayRight = rightmostGradeAt(b.w, b.d);
  const leftAtDayBoundary  = (firstG === dayLeft);
  const rightAtDayBoundary = (lastG === dayRight);

  const leftInset  = leftAtDayBoundary  ? DAY_INSET : GRADE_INSET;
  const rightInset = rightAtDayBoundary ? DAY_INSET : GRADE_INSET;

  let left  = colFirst.left + leftInset;
  let right = colLast.right - rightInset;

  // Hard safety clamp: right edge must sit at least 6px before the next
  // rendered day's leftmost grade. The "next day" lives in the same week if
  // b.d < 4, otherwise in the next rendered week's day 0 (only relevant in
  // full-challenge mode).
  let nextLeftCol = null;
  if (b.d < 4 && weekMetrics[b.d + 1]) {
    const nextLeftId = leftmostGradeAt(b.w, b.d + 1);
    if (nextLeftId) nextLeftCol = weekMetrics[b.d + 1][nextLeftId];
  } else if (b.d === 4) {
    const nextWeek = columnMetrics[b.w + 1];
    if (nextWeek && nextWeek[0]) {
      const nextLeftId = leftmostGradeAt(b.w + 1, 0);
      if (nextLeftId) nextLeftCol = nextWeek[0][nextLeftId];
    }
  }
  if (nextLeftCol) {
    const guard = nextLeftCol.left - 6;
    if (right > guard) {
      console.warn(`[clamp] Block ${b.id} "${b.ttl}" would cross the Wk${b.w} day ${b.d} boundary — clamping right edge from ${right.toFixed(1)}px to ${guard.toFixed(1)}px.`);
      right = guard;
    }
  }

  return { left, width: Math.max(20, right - left) };
}

function drawDaySeparators() {
  for (const old of cal.querySelectorAll('.day-sep')) old.remove();
  if (!weeksRendered.length) return;

  // For each rendered week, draw bars between day 0|1, 1|2, 2|3, 3|4 (thin)
  // AND a thicker bar between Fri of week N and Mon of week N+1 (week boundary).
  for (const w of weeksRendered) {
    const m = columnMetrics[w];
    if (!m) continue;
    for (let d = 1; d < 5; d++) {
      const leftId = leftmostGradeAt(w, d);
      if (!leftId) continue;
      const nextLeft = m[d][leftId];
      if (!nextLeft) continue;
      const bar = document.createElement('div');
      bar.className = 'day-sep';
      bar.style.left = (nextLeft.left - 1.5) + 'px';
      cal.appendChild(bar);
    }
  }
  // Week-boundary bars (only exist when fullChallenge mode has multiple weeks)
  for (let i = 0; i < weeksRendered.length - 1; i++) {
    const nextWeek = weeksRendered[i + 1];
    const leftId = leftmostGradeAt(nextWeek, 0);
    if (!leftId) continue;
    const nextLeft = columnMetrics[nextWeek][0][leftId];
    if (!nextLeft) continue;
    const bar = document.createElement('div');
    bar.className = 'day-sep week-sep';
    bar.style.left = (nextLeft.left - 2.5) + 'px';
    cal.appendChild(bar);
  }
}

// Build the sets that drive lineage outline rings: which block is selected,
// which tags are its prereqs, which are its dependents, plus (if a pin is
// selected) which concept_tags feed into it. Shared by Grid and Arc.
function computeLineageSets() {
  const focalId = focalBlockId();
  const selBlock = focalId ? state.blocks.find(x => x.id === focalId) : null;
  const selPin   = state.selectedPinId   ? state.blocks.find(x => x.id === state.selectedPinId)   : null;
  const selectedSet = new Set(state.selectedBlockIds || []);
  const selTag = selBlock && selBlock.tag;
  const prereqTagSet = new Set(selTag && PREREQS[selTag] ? PREREQS[selTag] : []);
  const dependentTagSet = new Set();
  if (selTag) {
    for (const [childTag, parents] of Object.entries(PREREQS)) {
      if (parents.includes(selTag)) dependentTagSet.add(childTag);
    }
  }
  const pinServiceTagSet = new Set();
  if (selPin && selPin.tag) {
    for (const [conceptTag, pinTag] of Object.entries(PIN_SERVICE)) {
      if (pinTag === selPin.tag) pinServiceTagSet.add(conceptTag);
    }
  }
  return { selBlock, selPin, selectedSet, prereqTagSet, dependentTagSet, pinServiceTagSet };
}

function positionBlocksAfterMount() {
  measureColumns();
  const filter = state.guideFilter || 'all';
  const { selBlock, selPin, selectedSet, prereqTagSet, dependentTagSet, pinServiceTagSet } = computeLineageSets();

  for (const el of cal.querySelectorAll('.block')) {
    const id = el.dataset.id;
    const b = state.blocks.find(x => x.id === id);
    if (!b) continue;

    const bounds = blockBounds(b);
    if (bounds) {
      el.style.left  = bounds.left  + 'px';
      el.style.width = bounds.width + 'px';
    }
    const startSlot = parseInt(el.dataset.startSlot, 10);
    el.style.top = (headerHeight + startSlot * SLOT_PX) + 'px';
    el.style.visibility = 'visible';

    // Guide filter in grid view: dim non-matching, highlight matching.
    el.classList.remove('dimmed', 'filter-match');
    if (filter !== 'all') {
      const match = (filter === 'unassigned') ? !b.guide : b.guide === filter;
      if (match) el.classList.add('filter-match');
      else el.classList.add('dimmed');
    }

    // Lineage outline rings (additive, quiet).
    // Multi-select: every block in selectedSet gets ring-selected. Only the
    // FOCAL block (last picked, == selBlock) drives prereq/dependent rings.
    el.classList.remove('ring-selected', 'ring-prereq', 'ring-dependent');
    if (selectedSet.size) {
      if (selectedSet.has(b.id)) {
        el.classList.add('ring-selected');
      } else if (selBlock && b.tag && prereqTagSet.has(b.tag)) {
        el.classList.add('ring-prereq');
      } else if (selBlock && b.tag && dependentTagSet.has(b.tag)) {
        el.classList.add('ring-dependent');
      }
    } else if (selPin) {
      if (b.id === selPin.id) el.classList.add('ring-selected');
      else if (b.tag && pinServiceTagSet.has(b.tag)) el.classList.add('ring-prereq');
    }
  }
  drawDaySeparators();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatTime(min) {
  const h24 = 9 + Math.floor(min / 60);
  const m = min % 60;
  const ap = h24 >= 12 ? 'PM' : 'AM';
  let h = h24 > 12 ? h24 - 12 : h24;
  if (h === 0) h = 12;
  return `${h}:${m.toString().padStart(2,'0')} ${ap}`;
}

// ============================================================
// GRADES — helpers
// ============================================================
// state.grades is the canonical ordered list; state.visibleGradeIds is the
// subset currently rendered. A block's grades array (b.grades) holds one or
// more grade ids that must be contiguous in state.grades order.

function gradeIndex(gradeId) {
  return state.grades.findIndex(g => g.id === gradeId);
}

function visibleGrades() {
  // Returns ordered array of visible grade objects.
  const visSet = new Set(state.visibleGradeIds || []);
  return state.grades.filter(g => visSet.has(g.id));
}

// Return the contiguous visible sub-range of a block's grades, in canonical
// state.grades order. May be empty (block fully hidden) or shorter than
// b.grades if some grades are hidden. We always pick the LEFTMOST contiguous
// run if the visible sub-range is non-contiguous (e.g. block spans G5+G6+G7,
// G6 hidden → returns ['G5'] only, with the right-edge marker telling the
// user there's more beyond view).
function visibleGradeRange(b) {
  const visSet = new Set(state.visibleGradeIds || []);
  // Walk b.grades in CANONICAL order (sorted by gradeIndex), accumulate the
  // first contiguous run of visibles.
  const ordered = [...b.grades].sort((a, c) => gradeIndex(a) - gradeIndex(c));
  let run = [];
  let started = false;
  for (const gid of ordered) {
    if (visSet.has(gid)) {
      run.push(gid);
      started = true;
    } else if (started) {
      break; // hit a hidden grade after some visibles → stop
    }
  }
  return run;
}

// True iff some of b.grades are hidden (so we should draw the right-edge marker).
function hasHiddenGrades(b) {
  const visSet = new Set(state.visibleGradeIds || []);
  return b.grades.some(gid => !visSet.has(gid));
}

// Set intersection: do two grade-id arrays share any id?
function gradesIntersect(arr1, arr2) {
  const s = new Set(arr1);
  for (const x of arr2) if (s.has(x)) return true;
  return false;
}

// Display label for a block's grades: "G5", "G6", "G5+G6", "G5+G6+G7".
function gradesLabel(gradesArr) {
  if (!gradesArr || !gradesArr.length) return '';
  const ordered = [...gradesArr].sort((a, c) => gradeIndex(a) - gradeIndex(c));
  return ordered.map(gid => {
    const g = state.grades.find(x => x.id === gid);
    return g ? g.label : gid;
  }).join('+');
}

// Slugify a label into a stable id. Uppercase, strip non-alphanumeric,
// append digit on collision.
function slugifyGradeLabel(label) {
  let base = String(label || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (!base) base = 'GRADE';
  if (!state.grades.find(g => g.id === base)) return base;
  let n = 2;
  while (state.grades.find(g => g.id === `${base}${n}`)) n++;
  return `${base}${n}`;
}

// Count blocks currently using a given grade id.
function gradeUsageCount(gradeId) {
  let n = 0;
  for (const b of state.blocks) if (b.grades && b.grades.includes(gradeId)) n++;
  return n;
}

// ============================================================
// UNDO / REDO
// ============================================================
// Action records, not state snapshots. Each entry stores only the
// block id and before/after values for the changed fields.
//   { type: 'move',   blockId, before: {w,d,g,s}, after: {w,d,g,s} }
//   { type: 'assign', blockId, before: <guide|null>, after: <guide|null> }
// Stacks are transient — never persisted. Reload = clean slate.
const UNDO_CAP = 50;
let undoStack = [];
let redoStack = [];

function pushUndo(action) {
  undoStack.push(action);
  if (undoStack.length > UNDO_CAP) undoStack.shift();
  redoStack = [];  // any new action invalidates the redo branch
}

// When true, the next renderLineagePanel() immediately enters title-edit
// mode on the focal block. Set in drag-create's pointerup so the flow is:
// drag → release → cursor in title input. Declared up here so functions
// further down the file can read it without a let/TDZ error.
let _autoFocusTitleAfterRender = false;

function applyAction(action, direction) {
  if (action.type === 'group-move') {
    // Iterate every per-block change in the action's changes array.
    for (const ch of action.changes) {
      const b = state.blocks.find(x => x.id === ch.blockId);
      if (!b) continue;
      const t = direction === 'undo' ? ch.before : ch.after;
      b.w = t.w; b.d = t.d; b.grades = t.grades.slice(); b.s = t.s;
    }
    return;
  }
  // multi-delete (from cut): undo restores the snapshots, redo re-removes by id.
  if (action.type === 'multi-delete') {
    if (direction === 'undo') {
      // Re-insert deep clones (so future redo has its own copy).
      for (const snap of action.blocks) state.blocks.push(JSON.parse(JSON.stringify(snap)));
    } else {
      const ids = new Set(action.blocks.map(b => b.id));
      state.blocks = state.blocks.filter(b => !ids.has(b.id));
    }
    return;
  }
  // multi-add (from paste): undo removes the new blocks, redo re-inserts.
  if (action.type === 'multi-add') {
    if (direction === 'undo') {
      const ids = new Set(action.blocks.map(b => b.id));
      state.blocks = state.blocks.filter(b => !ids.has(b.id));
    } else {
      for (const snap of action.blocks) state.blocks.push(JSON.parse(JSON.stringify(snap)));
    }
    return;
  }
  const b = state.blocks.find(x => x.id === action.blockId);
  if (!b) return;
  const target = direction === 'undo' ? action.before : action.after;
  if (action.type === 'move') {
    b.w = target.w; b.d = target.d; b.grades = target.grades.slice(); b.s = target.s;
  } else if (action.type === 'assign') {
    b.guide = target;
  } else if (action.type === 'lock') {
    b.locked = target;
  } else if (action.type === 'desc') {
    // target = string for direction. before/after are the two values.
    b.desc = direction === 'undo' ? action.before : action.after;
  } else if (action.type === 'tier') {
    // Toggle a single std code's defensible/soft membership.
    const want = direction === 'undo' ? action.before : action.after;
    if (!Array.isArray(b.std_defensible)) b.std_defensible = [];
    const has = b.std_defensible.includes(action.std_code);
    if (want === 'defensible' && !has) {
      b.std_defensible = [...b.std_defensible, action.std_code];
    } else if (want === 'soft' && has) {
      b.std_defensible = b.std_defensible.filter(s => s !== action.std_code);
    }
  } else if (action.type === 'edit-grades') {
    // before/after are full grades arrays. Replace wholesale.
    b.grades = (direction === 'undo' ? action.before : action.after).slice();
  } else if (action.type === 'edit-title') {
    b.ttl = direction === 'undo' ? action.before : action.after;
  } else if (action.type === 'edit-tag') {
    b.tag = direction === 'undo' ? action.before : action.after;
  }
}

function undo() {
  const action = undoStack.pop();
  if (!action) return;
  applyAction(action, 'undo');
  redoStack.push(action);
  saveState();
  render();
}

function redo() {
  const action = redoStack.pop();
  if (!action) return;
  applyAction(action, 'redo');
  undoStack.push(action);
  saveState();
  render();
}

// ============================================================
// CUT / COPY / PASTE
// ============================================================
// In-memory clipboard. Survives within the page session but not across
// reloads (deliberately — cross-session paste of curriculum content would
// be confusing if the source state has drifted). Each entry is a deep
// clone of a block; on paste we mint new ids.
let clipboard = [];

// Brief CSS flash on the source blocks when a copy happens.
function flashCopiedBlocks(ids) {
  for (const id of ids) {
    const el = cal.querySelector(`.block[data-id="${CSS.escape(id)}"]`);
    if (el) {
      el.classList.remove('flash-copied'); // restart animation
      // Force reflow so the class re-add actually retriggers the animation.
      void el.offsetWidth;
      el.classList.add('flash-copied');
      setTimeout(() => el && el.classList.remove('flash-copied'), 700);
    }
  }
}

// Decide whether to intercept a clipboard shortcut. We defer to native
// behavior when the user is typing in a field (grade-label rename) or has
// any text selected on the page. The keydown handler also screens out
// inputs at its top level, but checking here keeps these helpers honest
// in case they're called from other entry points later.
function shouldHandleClipboard(e) {
  const t = e.target;
  if (t && (['INPUT','TEXTAREA','SELECT'].includes(t.tagName) || t.isContentEditable)) return false;
  const sel = window.getSelection && window.getSelection();
  if (sel && sel.toString && sel.toString().length > 0) return false;
  return true;
}

function copySelection() {
  const ids = state.selectedBlockIds || [];
  if (!ids.length) return false;
  const blocks = state.blocks.filter(b => ids.includes(b.id));
  if (!blocks.length) return false;
  clipboard = blocks.map(b => JSON.parse(JSON.stringify(b)));
  flashCopiedBlocks(ids);
  return true;
}

function cutSelection() {
  const ids = state.selectedBlockIds || [];
  if (!ids.length) return;
  const candidates = state.blocks.filter(b => ids.includes(b.id));
  if (!candidates.length) return;
  // Cut copies everything selected (including locked, so paste still
  // duplicates structure). But it only DELETES unlocked ones — lunch,
  // movement, etc. shouldn't disappear via an accidental Cmd+X.
  clipboard = candidates.map(b => JSON.parse(JSON.stringify(b)));
  flashCopiedBlocks(ids);
  const removable = candidates.filter(b => !b.locked);
  if (!removable.length) {
    // All selected blocks are locked — cut behaves like copy.
    console.log('[cut] All selected blocks are locked; copied without delete.');
    return;
  }
  const removedSnapshots = removable.map(b => JSON.parse(JSON.stringify(b)));
  const removeIds = new Set(removable.map(b => b.id));
  state.blocks = state.blocks.filter(b => !removeIds.has(b.id));
  state.selectedBlockIds = [];
  pushUndo({ type: 'multi-delete', blocks: removedSnapshots });
  saveState();
  render();
}

function pasteClipboard() {
  if (!clipboard.length) return;
  // Translate weeks: the earliest week in the clipboard becomes the
  // user's current week. Multi-week selections preserve their relative
  // spread (paste a Wk3+Wk4 pair into Wk5 → ends up in Wk5+Wk6).
  // In full-challenge mode there's no specific focus week, so preserve
  // absolute weeks (translate by 0).
  const srcMinW = Math.min(...clipboard.map(b => b.w));
  const targetW = state.fullChallenge ? srcMinW : state.currentWeek;
  const wShift = targetW - srcMinW;

  // Mint unique new ids. ts + index keeps them stable for this paste batch.
  const ts = Date.now();
  const newBlocks = [];
  let skipped = 0;
  for (let i = 0; i < clipboard.length; i++) {
    const orig = clipboard[i];
    const nb = JSON.parse(JSON.stringify(orig));
    nb.id = `blk_p_${ts}_${i}`;
    nb.w = orig.w + wShift;
    if (nb.w < 1 || nb.w > 8) { skipped++; continue; }
    // Find first non-colliding start time, scooting down by SLOT_MIN.
    // We check against existing blocks AND against earlier blocks pasted
    // in this same batch (so two copies of the same block don't stack).
    let s = nb.s;
    let placed = false;
    while (s + nb.dur <= DAY_END_MIN) {
      const collided = state.blocks.concat(newBlocks).some(o =>
        o.w === nb.w && o.d === nb.d &&
        gradesIntersect(o.grades, nb.grades) &&
        s < o.s + o.dur && s + nb.dur > o.s
      );
      if (!collided) { placed = true; break; }
      s += SLOT_MIN;
    }
    if (!placed) { skipped++; continue; }
    nb.s = s;
    newBlocks.push(nb);
  }
  if (!newBlocks.length) {
    console.warn('[paste] No blocks placed (collisions or out-of-range weeks).');
    return;
  }
  state.blocks.push(...newBlocks);
  // Pasted blocks become the new selection so the user can immediately
  // drag them or Cmd+X to undo their placement.
  state.selectedBlockIds = newBlocks.map(b => b.id);
  // Snapshot for undo/redo. We deep-clone again so subsequent mutations
  // (e.g. dragging the pasted block) don't retroactively change the
  // recorded action's state.
  pushUndo({
    type: 'multi-add',
    blocks: newBlocks.map(b => JSON.parse(JSON.stringify(b))),
  });
  saveState();
  render();
  if (skipped > 0) {
    console.warn(`[paste] ${skipped} block(s) skipped — no fit found in the day.`);
  }
}

// ============================================================
// DRAG
// ============================================================
let dragState = null;

// Edge-scroll: when dragging in Full challenge mode, auto-pan cal-wrap
// when the pointer enters a band near the viewport edge so blocks can
// be dragged across all 8 weeks. Math is mode-agnostic — in single-week
// mode, scrollWidth ≈ clientWidth, so the clamps yield zero deltas and
// nothing scrolls.
const EDGE_ZONE = 60;        // px from viewport edge that triggers scroll
const MAX_EDGE_SCROLL = 18;  // px per frame at the very edge (~1080 px/sec @ 60fps)
let edgeScrollRaf = null;
let lastPointerEvent = null;

function computeEdgeScrollDeltas(e) {
  const r = calWrap.getBoundingClientRect();
  const px = e.clientX, py = e.clientY;

  const dLeft   = px - r.left;
  const dRight  = r.right - px;
  const dTop    = py - r.top;
  const dBottom = r.bottom - py;

  let dx = 0, dy = 0;

  if (dLeft >= 0 && dLeft < EDGE_ZONE) {
    const depth = (EDGE_ZONE - dLeft) / EDGE_ZONE;
    dx = -depth * MAX_EDGE_SCROLL;
  } else if (dRight >= 0 && dRight < EDGE_ZONE) {
    const depth = (EDGE_ZONE - dRight) / EDGE_ZONE;
    dx = depth * MAX_EDGE_SCROLL;
  }

  if (dTop >= 0 && dTop < EDGE_ZONE) {
    const depth = (EDGE_ZONE - dTop) / EDGE_ZONE;
    dy = -depth * MAX_EDGE_SCROLL;
  } else if (dBottom >= 0 && dBottom < EDGE_ZONE) {
    const depth = (EDGE_ZONE - dBottom) / EDGE_ZONE;
    dy = depth * MAX_EDGE_SCROLL;
  }

  // Clamp to actual scroll range so we don't overshoot.
  if (dx < 0) dx = Math.max(dx, -calWrap.scrollLeft);
  if (dx > 0) dx = Math.min(dx, calWrap.scrollWidth - calWrap.clientWidth - calWrap.scrollLeft);
  if (dy < 0) dy = Math.max(dy, -calWrap.scrollTop);
  if (dy > 0) dy = Math.min(dy, calWrap.scrollHeight - calWrap.clientHeight - calWrap.scrollTop);

  return { dx, dy };
}

function scheduleEdgeScroll() {
  if (edgeScrollRaf) return;
  if (!dragState || !lastPointerEvent) return;
  const { dx, dy } = computeEdgeScrollDeltas(lastPointerEvent);
  if (dx === 0 && dy === 0) return;
  edgeScrollRaf = requestAnimationFrame(edgeScrollTick);
}

function edgeScrollTick() {
  edgeScrollRaf = null;
  if (!dragState || !lastPointerEvent) return;
  const { dx, dy } = computeEdgeScrollDeltas(lastPointerEvent);
  if (dx === 0 && dy === 0) return;  // out of edge zone or fully scrolled — stop the loop
  calWrap.scrollLeft += dx;
  calWrap.scrollTop  += dy;
  // Re-snap: viewport shifted, so the column under the (stationary) pointer
  // changed. Recompute proposedWeek/Day/Grade/StartMin and reposition the
  // ghost. The ghost's left/top are cal-relative pixels and scroll with cal
  // automatically — only the snap target needs recomputation.
  updateDragGhost(lastPointerEvent);
  scheduleEdgeScroll();  // tail-call for next frame
}

function attachDrag(el, b) {
  const MOVE_THRESHOLD = 4; // px — below this, pointerup is a click, not a drag
  let startClientX = 0, startClientY = 0;
  let armed = false;
  let moved = false;

  el.addEventListener('pointerdown', (e) => {
    if (e.button !== 0) return;     // left button only
    if (e.target.tagName === 'BUTTON') return;
    if (e.metaKey || e.ctrlKey) {
      // Cmd/Ctrl+pointerdown is a multi-select toggle, not a drag-arm.
      // Let the pointerup-as-click path handle it.
    }
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    startClientX = e.clientX;
    startClientY = e.clientY;
    armed = true;
    moved = false;
    const rect = el.getBoundingClientRect();

    // Group composition: if the dragged block is part of selectedBlockIds,
    // drag the whole group (filtering out locked ones). Otherwise this is
    // a single-block drag; replace selection with [b.id] semantics happen
    // on commit (or via pointerup-as-click). We compute groupBlocks here
    // so updateDragGhost can use it from the first frame of movement.
    const selIds = state.selectedBlockIds || [];
    let groupIds;
    if (selIds.includes(b.id)) {
      // Drag the entire selected group (minus locked, minus reference dup).
      groupIds = selIds.filter(id => id !== b.id);
    } else {
      groupIds = [];
    }
    const followers = [];
    for (const id of groupIds) {
      const fb = state.blocks.find(x => x.id === id);
      if (!fb) continue;
      if (fb.locked) continue;  // locked blocks stay put; not part of the rigid move
      followers.push({
        block: fb,
        wOff: fb.w - b.w,
        dOff: fb.d - b.d,
        sOff: fb.s - b.s,
        // Grade offset isn't meaningful — each follower keeps its own grade.
      });
    }

    dragState = {
      id: b.id, el, block: b,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      startDay: b.d, startGrades: b.grades.slice(), startMin: b.s,
      pointerId: e.pointerId,
      followers,           // [{block, wOff, dOff, sOff}, ...]
      followerGhosts: [],  // populated when drag actually arms (first move)
    };
    // 'dragging' class and ghost are deferred until the pointer actually moves.
  });

  el.addEventListener('pointermove', (e) => {
    if (!dragState || dragState.id !== b.id || !armed) return;
    if (!moved) {
      const dx = e.clientX - startClientX;
      const dy = e.clientY - startClientY;
      if (Math.hypot(dx, dy) < MOVE_THRESHOLD) return;
      // Crossed threshold — begin real drag.
      moved = true;
      el.classList.add('dragging');
      const ghost = document.createElement('div');
      ghost.className = 'drop-ghost';
      ghost.style.width = el.style.width;
      ghost.style.height = el.style.height;
      ghost.style.left = el.style.left;
      ghost.style.top = el.style.top;
      cal.appendChild(ghost);
      dragState.ghost = ghost;
      // Follower ghosts: one per non-reference, non-locked group member.
      // Each starts at the follower's current rendered position; updateDragGhost
      // re-positions them per frame.
      for (const f of dragState.followers) {
        const fEl = cal.querySelector(`[data-id="${f.block.id}"]`);
        if (!fEl) continue;
        fEl.classList.add('dragging');
        const fGhost = document.createElement('div');
        fGhost.className = 'drop-ghost';
        fGhost.style.width = fEl.style.width;
        fGhost.style.height = fEl.style.height;
        fGhost.style.left = fEl.style.left;
        fGhost.style.top = fEl.style.top;
        cal.appendChild(fGhost);
        dragState.followerGhosts.push({ block: f.block, ghost: fGhost, sourceEl: fEl, offsets: f });
      }
    }
    updateDragGhost(e);
    lastPointerEvent = e;
    scheduleEdgeScroll();
  });

  el.addEventListener('pointerup', (e) => {
    if (!dragState || dragState.id !== b.id || !armed) return;
    armed = false;
    if (!moved) {
      // No movement — treat as click.
      try { el.releasePointerCapture(dragState.pointerId); } catch(_) {}
      lastPointerEvent = null;
      dragState = null;
      if (e.metaKey || e.ctrlKey) toggleBlockInSelection(b.id);
      else selectBlock(b.id);
      return;
    }
    finishDrag(e);
  });

  el.addEventListener('pointercancel', (e) => {
    if (!dragState || dragState.id !== b.id) return;
    armed = false;
    if (edgeScrollRaf) { cancelAnimationFrame(edgeScrollRaf); edgeScrollRaf = null; }
    lastPointerEvent = null;
    cancelDrag();
  });
}

function updateDragGhost(e) {
  if (!dragState) return;
  if (!Object.keys(columnMetrics).length) measureColumns();
  if (!Object.keys(columnMetrics).length) return;

  const calRect = cal.getBoundingClientRect();
  const pointerX = e.clientX - calRect.left;
  const pointerY = e.clientY - calRect.top;

  // Width in grade columns = how many grades the dragged block occupies.
  const widthCols = dragState.startGrades.length;
  const targetX = pointerX - dragState.offsetX;
  const visGrades = visibleGrades();

  // Snap reference block: find the closest visible grade column by left-edge
  // distance across all rendered weeks.
  let best = null, bestDist = Infinity;
  for (const w of weeksRendered) {
    const weekM = columnMetrics[w];
    if (!weekM) continue;
    for (let d = 0; d < 5; d++) {
      const m = weekM[d];
      if (!m) continue;
      for (const g of visGrades) {
        if (!m[g.id]) continue;
        const dist = Math.abs(m[g.id].left - targetX);
        if (dist < bestDist) { bestDist = dist; best = { week: w, day: d, gradeId: g.id }; }
      }
    }
  }
  if (!best) return;

  const week = best.week;
  const day  = best.day;
  // Choose the proposed grades array. For a single-grade block, just [snap].
  // For a multi-grade block, take widthCols consecutive visible grades starting
  // at snap; if that runs off the right end of visible grades, slide left so
  // we still occupy widthCols contiguous visible grades (clamped within day).
  const visIds = visGrades.map(g => g.id);
  const snapIdx = visIds.indexOf(best.gradeId);
  let startIdx = snapIdx;
  if (startIdx + widthCols > visIds.length) startIdx = visIds.length - widthCols;
  if (startIdx < 0) startIdx = 0;
  const proposedGrades = visIds.slice(startIdx, startIdx + Math.min(widthCols, visIds.length));

  const virtualBlock = { ...dragState.block, w: week, d: day, grades: proposedGrades };
  const refBounds = blockBounds(virtualBlock);
  if (!refBounds) return;

  // Y → slot
  const yInGrid = pointerY - dragState.offsetY - headerHeight;
  let startSlot = Math.round(yInGrid / SLOT_PX);
  const slots = dragState.block.dur / SLOT_MIN;
  if (startSlot < 0) startSlot = 0;
  if (startSlot + slots > SLOTS_PER_DAY) startSlot = SLOTS_PER_DAY - slots;
  const newStartMin = startSlot * SLOT_MIN;

  // Validate the whole group (reference + followers). A move is valid iff:
  //  (a) every block's proposed (w, d) lands in weeksRendered + 0..4
  //  (b) every block's proposed time stays in [DAY_START_MIN, DAY_END_MIN-dur]
  //  (c) no block in the group collides with any non-selected block (grade overlap)
  // Selected/group blocks don't collide with each other.
  const groupIds = new Set([dragState.block.id, ...dragState.followers.map(f => f.block.id)]);
  const proposals = [];

  // Reference proposal
  const refColl = checkCollisionAgainst(dragState.block, day, proposedGrades, newStartMin, week, groupIds);
  proposals.push({
    isRef: true,
    block: dragState.block,
    bounds: refBounds,
    startSlot,
    proposedW: week, proposedD: day, proposedGrades, proposedS: newStartMin,
    rangeError: false,
    collision: refColl,
  });

  // Follower proposals — followers keep their original grade list, just shifted in (w,d,s).
  for (const fg of dragState.followerGhosts) {
    const f = fg.offsets;
    const fb = fg.block;
    const pW = week + f.wOff;
    const pD = day  + f.dOff;
    const pS = newStartMin + f.sOff;
    let rangeError = false;
    if (!weeksRendered.includes(pW)) rangeError = true;
    if (pD < 0 || pD > 4) rangeError = true;
    if (pS < DAY_START_MIN) rangeError = true;
    if (pS + fb.dur > DAY_END_MIN) rangeError = true;
    let bounds = null, fStartSlot = 0, coll = null;
    if (!rangeError) {
      const virt = { ...fb, w: pW, d: pD };
      bounds = blockBounds(virt);
      fStartSlot = Math.round((pS - DAY_START_MIN) / SLOT_MIN);
      coll = checkCollisionAgainst(fb, pD, fb.grades, pS, pW, groupIds);
    }
    proposals.push({
      isRef: false, block: fb, ghost: fg.ghost, bounds, startSlot: fStartSlot,
      proposedW: pW, proposedD: pD, proposedGrades: fb.grades.slice(), proposedS: pS,
      rangeError, collision: coll,
    });
  }

  const groupInvalid = proposals.some(p => p.rangeError || p.collision);

  // Position reference ghost
  dragState.ghost.style.left = refBounds.left + 'px';
  dragState.ghost.style.top  = (headerHeight + startSlot * SLOT_PX) + 'px';
  dragState.ghost.style.width = refBounds.width + 'px';
  dragState.ghost.style.borderColor = groupInvalid ? 'var(--warn)' : 'var(--accent)';
  dragState.ghost.style.background  = groupInvalid ? 'rgba(178,31,31,0.2)' : 'rgba(194,79,29,0.15)';

  // Position follower ghosts. If a follower has rangeError its bounds are null —
  // hide its ghost instead of leaving it at a stale position.
  for (let i = 1; i < proposals.length; i++) {
    const p = proposals[i];
    if (!p.bounds) {
      p.ghost.style.display = 'none';
      continue;
    }
    p.ghost.style.display = '';
    p.ghost.style.left = p.bounds.left + 'px';
    p.ghost.style.top  = (headerHeight + p.startSlot * SLOT_PX) + 'px';
    p.ghost.style.width = p.bounds.width + 'px';
    p.ghost.style.borderColor = groupInvalid ? 'var(--warn)' : 'var(--accent)';
    p.ghost.style.background  = groupInvalid ? 'rgba(178,31,31,0.2)' : 'rgba(194,79,29,0.15)';
  }

  dragState.proposedWeek = week;
  dragState.proposedDay = day;
  dragState.proposedGrades = proposedGrades;
  dragState.proposedStartMin = newStartMin;
  dragState.proposedCollision = groupInvalid;
  dragState.proposals = proposals;
}

// Collision check that excludes a specified id-set from consideration. Used by
// group drag so that group members don't collide with each other (they're all
// moving together). newGrades is an array of grade ids.
function checkCollisionAgainst(block, newDay, newGrades, newStartMin, newWeek, ignoreIds) {
  if (newWeek === undefined) newWeek = state.currentWeek;
  const newEndMin = newStartMin + block.dur;
  for (const o of state.blocks) {
    if (o.id === block.id) continue;
    if (ignoreIds && ignoreIds.has(o.id)) continue;
    if (o.w !== newWeek) continue;
    if (o.d !== newDay) continue;
    if (!gradesIntersect(o.grades, newGrades)) continue;
    const oEnd = o.s + o.dur;
    if (newStartMin < oEnd && newEndMin > o.s) return o;
  }
  return null;
}

function checkCollision(block, newDay, newGrades, newStartMin, newWeek) {
  if (newWeek === undefined) newWeek = state.currentWeek;
  const newEndMin = newStartMin + block.dur;
  for (const o of state.blocks) {
    if (o.id === block.id) continue;
    if (o.w !== newWeek) continue;
    if (o.d !== newDay) continue;
    if (!gradesIntersect(o.grades, newGrades)) continue;
    const oEnd = o.s + o.dur;
    if (newStartMin < oEnd && newEndMin > o.s) return o;
  }
  return null;
}

function finishDrag(e) {
  if (edgeScrollRaf) { cancelAnimationFrame(edgeScrollRaf); edgeScrollRaf = null; }
  lastPointerEvent = null;
  const el = dragState.el;
  el.classList.remove('dragging');
  try { el.releasePointerCapture(dragState.pointerId); } catch(_) {}
  if (dragState.ghost) dragState.ghost.remove();
  // Clean up follower ghosts and re-show their source elements.
  if (dragState.followerGhosts) {
    for (const fg of dragState.followerGhosts) {
      if (fg.ghost) fg.ghost.remove();
      if (fg.sourceEl) fg.sourceEl.classList.remove('dragging');
    }
  }

  if (dragState.proposedDay !== undefined && !dragState.proposedCollision && dragState.proposals) {
    // Commit the group move. proposedCollision is set by the WHOLE-GROUP
    // validity check in updateDragGhost — true if any member was invalid.
    const changes = [];
    for (const p of dragState.proposals) {
      const b = state.blocks.find(x => x.id === p.block.id);
      if (!b) continue;
      const before = { w: b.w, d: b.d, grades: b.grades.slice(), s: b.s };
      b.w = p.proposedW;
      b.d = p.proposedD;
      b.grades = p.proposedGrades.slice();
      b.s = p.proposedS;
      const after = { w: b.w, d: b.d, grades: b.grades.slice(), s: b.s };
      const sameGrades = before.grades.length === after.grades.length
                     && before.grades.every((g, i) => g === after.grades[i]);
      const changed = before.w !== after.w || before.d !== after.d
                   || !sameGrades || before.s !== after.s;
      if (changed) changes.push({ blockId: b.id, before, after });
    }
    if (changes.length === 1) {
      // Single-block move — record as 'move' (preserves existing undo semantics)
      pushUndo({ type: 'move', blockId: changes[0].blockId, before: changes[0].before, after: changes[0].after });
    } else if (changes.length > 1) {
      // Multi-block move — one undo entry covers the whole group.
      pushUndo({ type: 'group-move', changes });
    }
    saveState();
  }
  dragState = null;
  render();
}

function cancelDrag() {
  if (edgeScrollRaf) { cancelAnimationFrame(edgeScrollRaf); edgeScrollRaf = null; }
  lastPointerEvent = null;
  if (!dragState) return;
  if (dragState.ghost) dragState.ghost.remove();
  dragState.el.classList.remove('dragging');
  if (dragState.followerGhosts) {
    for (const fg of dragState.followerGhosts) {
      if (fg.ghost) fg.ghost.remove();
      if (fg.sourceEl) fg.sourceEl.classList.remove('dragging');
    }
  }
  dragState = null;
}

let guideMenu = null;
function openGuideMenu(e, b) {
  closeGuideMenu();
  const menu = document.createElement('div');
  menu.className = 'guide-pick-menu';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  const guides = [
    {code: 'K', name: 'Kevin'},
    {code: 'J', name: 'John'},
    {code: 'A', name: 'Anand'},

function closeGuideMenu() {
